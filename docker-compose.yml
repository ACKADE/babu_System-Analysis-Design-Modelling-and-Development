services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce
      MYSQL_PASSWORD: ecommerce123
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: mysql://ecommerce:ecommerce123@mysql:3306/ecommerce
      JWT_ACCESS_SECRET: access-secret-change-in-production
      JWT_REFRESH_SECRET: refresh-secret-change-in-production
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push && npx prisma db seed && npx tsx src/index.ts"

  user-frontend:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: ecommerce-user-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  store-frontend:
    build:
      context: ./frontend-store
      dockerfile: Dockerfile
    container_name: ecommerce-store-frontend
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

volumes:
  mysql_data:
